<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6d28d9" />
  <meta name="description" content="Offline-first P2P multiplayer UNO — no server, no AI, just friends." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>UNO • P2P Multiplayer</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated mesh gradient background -->
  <div class="mesh-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- ============== LOBBY ============== -->
  <section id="lobby" class="screen active">
    <div class="glass-panel lobby-panel">
      <header class="brand">
        <div class="logo-mark">U</div>
        <h1>UNO<span class="accent">•</span>P2P</h1>
        <p class="tagline">Human vs Human. No servers. No AI. Just friends.</p>
      </header>

      <!-- Create Room -->
      <div class="panel-section" id="create-section">
        <h2>Create a Room</h2>
        <div class="field">
          <label for="host-name">Your Name</label>
          <input id="host-name" type="text" maxlength="14" placeholder="e.g. Alex" autocomplete="off" />
        </div>
        <div class="field">
          <label for="player-count">Players</label>
          <div class="chip-group" id="player-count">
            <button class="chip" data-count="2">2</button>
            <button class="chip" data-count="3">3</button>
            <button class="chip" data-count="4">4</button>
            <button class="chip" data-count="6">6</button>
          </div>
        </div>
        <button class="btn btn-primary" id="create-btn">
          <span class="btn-ico">✦</span> Create Room
        </button>
      </div>

      <!-- Divider -->
      <div class="divider"><span>OR</span></div>

      <!-- Join Room -->
      <div class="panel-section" id="join-section">
        <h2>Join a Room</h2>
        <div class="field">
          <label for="guest-name">Your Name</label>
          <input id="guest-name" type="text" maxlength="14" placeholder="e.g. Sam" autocomplete="off" />
        </div>
        <div class="field">
          <label for="join-code">Session Code</label>
          <input id="join-code" type="text" maxlength="10" placeholder="UNO-XXXXXX" autocomplete="off" spellcheck="false" />
        </div>
        <button class="btn btn-secondary" id="join-btn">
          <span class="btn-ico">⚡</span> Join Room
        </button>
      </div>

      <!-- Session Display (Host) -->
      <div class="panel-section hidden" id="session-display">
        <h2>Waiting for Players</h2>
        <div class="session-code-box">
          <span class="session-label">Session Code</span>
          <div class="session-code" id="session-code">------</div>
          <button class="btn btn-ghost btn-sm" id="copy-code-btn">📋 Copy</button>
        </div>
        <div class="players-list" id="player-list"></div>
        <button class="btn btn-primary hidden" id="start-btn">
          <span class="btn-ico">▶</span> Start Game
        </button>
      </div>

      <footer class="lobby-footer">
        <span id="connection-status" class="status-dot offline">Offline</span>
      </footer>
    </div>
  </section>

  <!-- ============== GAME TABLE ============== -->
  <section id="game" class="screen">
    <!-- Top Bar -->
    <header class="top-bar glass-chip">
      <div class="top-left">
        <div class="logo-mark logo-mark-sm">U</div>
        <div class="session-info">
          <span class="session-code-mini" id="session-code-mini">------</span>
          <span class="turn-label" id="turn-label">Waiting…</span>
        </div>
      </div>
      <div class="top-right">
        <button class="icon-btn" id="chat-toggle-btn" title="Toggle chat">💬</button>
        <button class="icon-btn" id="leave-btn" title="Leave game">✕</button>
      </div>
    </header>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table" id="table">
        <!-- Center: draw + discard -->
        <div class="center-stack">
          <div class="pile draw-pile" id="draw-pile" title="Draw pile">
            <div class="card-back"></div>
            <span class="pile-count" id="draw-count">0</span>
          </div>
          <div class="pile discard-pile" id="discard-pile" title="Discard pile">
            <div id="top-card-slot"></div>
          </div>
          <div class="current-color" id="current-color" title="Active color"></div>
        </div>

        <!-- Players positioned around the table -->
        <div id="players-container"></div>
      </div>
    </div>

    <!-- My Hand -->
    <div class="my-hand-wrap">
      <div class="my-hand" id="my-hand"></div>
    </div>

    <!-- UNO Button -->
    <button class="uno-btn hidden" id="uno-btn">UNO!</button>

    <!-- Color Picker (Wild cards) -->
    <div class="color-picker hidden" id="color-picker">
      <div class="glass-panel color-panel">
        <h3>Choose a color</h3>
        <div class="color-grid">
          <button class="color-swatch" data-color="red" style="--c:#ef4444"></button>
          <button class="color-swatch" data-color="yellow" style="--c:#eab308"></button>
          <button class="color-swatch" data-color="green" style="--c:#22c55e"></button>
          <button class="color-swatch" data-color="blue" style="--c:#3b82f6"></button>
        </div>
      </div>
    </div>

    <!-- Chat Panel -->
    <aside class="chat-panel glass-panel hidden" id="chat-panel">
      <header class="chat-header">
        <h3>💬 Table Chat</h3>
        <button class="icon-btn" id="chat-close-btn">✕</button>
      </header>
      <div class="chat-messages" id="chat-messages"></div>
      <form class="chat-form" id="chat-form" autocomplete="off">
        <input id="chat-input" type="text" maxlength="140" placeholder="Type a message…" />
        <button type="submit" class="btn btn-primary btn-sm">Send</button>
      </form>
    </aside>

    <!-- Toast -->
    <div class="toast-wrap" id="toast-wrap" aria-live="polite"></div>

    <!-- Game Over Modal -->
    <div class="modal hidden" id="game-over-modal">
      <div class="glass-panel modal-panel">
        <h2 id="winner-title">🎉 Winner!</h2>
        <p id="winner-name">—</p>
        <button class="btn btn-primary" id="play-again-btn">Back to Lobby</button>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    // Register Service Worker for offline-first PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
