<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO P2P Multiplayer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app">
        <header><h1>UNO P2P</h1><div id="status">Ready</div></header>
        <main>
            <section class="table"><div class="center"><div id="deck" class="card back">UNO</div><div id="discard"></div></div></section>
            <section class="hand-area"><div id="hand" class="hand"></div></section>
            <section class="chat-area"><div id="chatBox"></div><div class="chat-input"><input id="chatInput" placeholder="Message..."><button id="sendChat">Send</button></div></section>
        </main>
        <div id="login-overlay"><button id="createBtn">Create Room</button><input id="roomInput" placeholder="Room ID"><button id="joinBtn">Join Room</button></div>
    </div>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
